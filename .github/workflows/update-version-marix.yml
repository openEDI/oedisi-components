name: Update Version Marix

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version-marix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update version_matrix.csv from latest release tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MONOREPO_OWNER: ${{ github.repository_owner }}
          MONOREPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/update_version_matrix.py

      - name: Create pull request with updated matrix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update version_matrix.csv from release tags"
          branch: "automation/update-version-marix"
          delete-branch: true
          title: "chore: update version_matrix.csv"
          body: |
            This PR updates version_matrix.csv with component versions mapped to
            the latest GitHub release tags for the monorepo and submodule repos.
          add-paths: |
            version_matrix.csv
