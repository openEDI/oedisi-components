name: Reusable Verify Dockerfiles

on:
  workflow_call:
    inputs:
      component-root:
        description: Optional path to a single component root (e.g. . or Components/broker)
        required: false
        type: string
        default: ""

jobs:
  verify-dockerfiles:
    runs-on: ubuntu-latest
    name: Verify Dockerfiles

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Dockerfile exists
        run: |
          component_root="${{ inputs.component-root }}"
          if [ -n "$component_root" ]; then
            component_dirs="$component_root"
          else
            component_dirs="Components/*"
          fi

          for component_dir in $component_dirs; do
            [ -d "$component_dir" ] || continue
            component="$(basename "$component_dir")"
            if [ "$component" = "broker" ]; then
              continue
            fi
            target="${component_dir}/Dockerfile"
            if [ -f "$target" ]; then
              echo "$target found"
            else
              echo "$target missing"
              exit 1
            fi
          done
