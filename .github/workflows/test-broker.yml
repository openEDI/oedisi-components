name: Test - Broker

on:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/broker/**'
      - '.github/workflows/test-broker.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/broker/**'
      - '.github/workflows/test-broker.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/broker[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/broker/tests/ -v --cov=broker --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/broker
        mypy src/broker --ignore-missing-imports
      continue-on-error: true
