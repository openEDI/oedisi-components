name: Unit Test - pnnl-dopf-admm

on:
  workflow_dispatch:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/pnnl-dopf-admm/**'
      - '.github/workflows/unit-test-pnnl-dopf-admm.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/pnnl-dopf-admm/**'
      - '.github/workflows/unit-test-pnnl-dopf-admm.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/pnnl-dopf-admm[test]

    - name: Run tests with pytest
      run: |
        pytest Components/pnnl-dopf-admm/tests/ -v --cov=admm_federate --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/pnnl-dopf-admm
        mypy src/admm_federate --ignore-missing-imports
      continue-on-error: true
