name: Unit Test - player

on:
  push:
    branches: [ main ]
    paths:
      - 'Components/player/**'
      - '.github/workflows/unit-test-player.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/player/**'
      - '.github/workflows/unit-test-player.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/player[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/player/tests/ -v --cov=player --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/player
        mypy src/player --ignore-missing-imports
      continue-on-error: true
