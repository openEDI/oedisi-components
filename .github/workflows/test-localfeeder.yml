name: Test - LocalFeeder

on:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/LocalFeeder/**'
      - '.github/workflows/test-localfeeder.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/LocalFeeder/**'
      - '.github/workflows/test-localfeeder.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/LocalFeeder[dev]
    
    - name: Run tests with pytest
      run: |
        pytest Components/LocalFeeder/tests/ -v --cov=localfeeder --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"
    
    - name: Run type checking with mypy
      run: |
        cd Components/LocalFeeder
        mypy src/localfeeder --ignore-missing-imports
      continue-on-error: true
