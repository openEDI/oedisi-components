name: Test - LinDistFlow

on:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/lindistflow_federate/**'
      - '.github/workflows/test-lindistflow.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/lindistflow_federate/**'
      - '.github/workflows/test-lindistflow.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/lindistflow_federate[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/lindistflow_federate/tests/ -v --cov=lindistflow_federate --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/lindistflow_federate
        mypy src/lindistflow_federate --ignore-missing-imports
      continue-on-error: true
