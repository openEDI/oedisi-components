name: Reusable Verify Components

on:
  workflow_call:
    inputs:
      component-root:
        description: Optional path to a single component root (e.g. . or Components/broker)
        required: false
        type: string
        default: ""

jobs:
  verify-components:
    runs-on: ubuntu-latest
    name: Verify component metadata

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check component_definition.json exists
        run: |
          for component_dir in Components/*; do
            [ -d "$component_dir" ] || continue
            component="$(basename "$component_dir")"
            if [ "$component" = "broker" ]; then
              continue
            fi
            target="${component_dir}/component_definition.json"
            if [ -f "$target" ]; then
              echo "$target found"
            else
              echo "$target missing"
              exit 1
            fi
          done

      - name: Check README.md exists
        run: |
          for component_dir in Components/*; do
            [ -d "$component_dir" ] || continue
            component="$(basename "$component_dir")"
            if [ "$component" = "broker" ]; then
              continue
            fi
            target="${component_dir}/README.md"
            if [ -f "$target" ]; then
              echo "$target found"
            else
              echo "$target missing"
              exit 1
            fi
          done
