name: RunExample

on:
  push:
    branches: [ main, al/restructed ]
  pull_request:
    branches: [ main ]

jobs:
  run-example:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}

    - name: Install component dependencies
      shell: bash -l {0}
      run: |
        pip install -e Components/broker \
                    -e Components/lindistflow_federate \
                    -e Components/LocalFeeder \
                    -e Components/measuring_federate \
                    -e Components/recorder \
                    -e Components/wls_federate

    - name: Run example simulation
      shell: bash -l {0}
      run: |
        oedisi build --system scenarios/docker_system.json
        oedisi run
        python post_analysis.py

    - name: Archive simulation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: simulation-results-py${{ matrix.python-version }}
        path: |
          *.png
          build/*.log
          outputs/
