name: RunExample

on:
  push:
    paths:
      - '.github/workflows/test-api.yml'
      - 'Components/broker/**'
      - 'Components/lindistflow_federate/**'
      - 'Components/LocalFeeder/**'
      - 'Components/measuring_federate/**'
      - 'Components/recorder/**'
      - 'Components/wls_federate/**'
      - 'scenarios/docker_system.json'


jobs:
  run-example:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4
      with:
          submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}

    - name: Install component dependencies
      shell: bash -l {0}
      run: |
        pip install -e Components/broker \
                    -e Components/lindistflow_federate \
                    -e Components/LocalFeeder \
                    -e Components/measuring_federate \
                    -e Components/recorder \
                    -e Components/wls_federate

    - name: Run example simulation
      shell: bash -l {0}
      run: |
        oedisi build --system scenarios/docker_system.json
        oedisi run
