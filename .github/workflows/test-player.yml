name: TestPlayerMeasuring

on:
  push:
    paths:
      - '.github/workflows/test-player.yml'
      - 'Components/broker/**'
      - 'Components/player/**'
      - 'Components/measuring_federate/**'
      - 'Components/recorder/**'
      - 'scenarios/player_measuring_system.json'
      - 'scenarios/player_measuring/**'
  pull_request:
    paths:
      - '.github/workflows/test-player.yml'
      - 'Components/broker/**'
      - 'Components/player/**'
      - 'Components/measuring_federate/**'
      - 'Components/recorder/**'
      - 'scenarios/player_measuring_system.json'
      - 'scenarios/player_measuring/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        miniconda-version: "latest"
        python-version: ${{ matrix.python-version }}
    - name: Install component dependencies
      shell: bash -l {0}
      run: |
        pip install -e Components/broker \
                    -e Components/player \
                    -e Components/measuring_federate \
                    -e Components/recorder

        pip install click
    - name: Run example
      shell: bash -l {0}
      run: |
        oedisi build --system scenarios/player_measuring_system.json
        mkdir -p build/player/data
        cp scenarios/player_measuring/voltages.csv build/player/data/
        cp scenarios/player_measuring/sensors.json build/player/data/
        oedisi run
    - name: Archive logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test_logs
        path: |
          build/*.log
