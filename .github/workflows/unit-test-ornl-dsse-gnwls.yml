name: Unit Test - ornl-dsse-gnwls

on:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/ornl-dsse-gnwls/**'
      - '.github/workflows/unit-test-ornl-dsse-gnwls.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/ornl-dsse-gnwls/**'
      - '.github/workflows/unit-test-ornl-dsse-gnwls.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/ornl-dsse-gnwls[test]

    - name: Run tests with pytest
      run: |
        pytest Components/ornl-dsse-gnwls/tests/ -v --cov=dsse_federate --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/ornl-dsse-gnwls
        mypy src/dsse_federate --ignore-missing-imports
      continue-on-error: true
