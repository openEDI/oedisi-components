name: TestDOPFOMOO

on:
  push:
    paths:
      - '.github/workflows/test-dopf.yml'
      - 'Components/broker/**'
      - 'Components/LocalFeeder/**'
      - 'Components/measuring_federate/**'
      - 'Components/recorder/**'
      - 'Components/omoo_federate/**'
      - 'scenarios/omoo_system.json'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
    - name: Install component dependencies
      shell: bash -l {0}
      run: |
        pip install -e Components/broker \
                    -e Components/LocalFeeder \
                    -e Components/measuring_federate \
                    -e Components/recorder \
                    -e Components/omoo_federate \

        pip install plotille
        pip install click
    - name: Run example
      shell: bash -l {0}
      run: |
        oedisi build --system scenarios/omoo_system.json
        oedisi run
    - name: Archive logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test_logs
        path: |
          build/*.log
