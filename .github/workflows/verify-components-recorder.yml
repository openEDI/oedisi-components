name: Verify Components - recorder

on:
  workflow_dispatch:
  push:
    paths:
      - 'Components/recorder/**'
      - '.github/workflows/verify-components-recorder.yml'
      - '.github/workflows/reusable_verify_components.yml'

jobs:
  verify:
    uses: ./.github/workflows/reusable_verify_components.yml
    with:
      component-root: Components/recorder
