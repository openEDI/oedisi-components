name: Verify Dockerfiles - player

on:
  push:
    paths:
      - 'Components/player/**'
      - '.github/workflows/verify-dockerfiles-player.yml'
      - '.github/workflows/reusable_verify_dockerfiles.yml'

jobs:
  verify:
    uses: ./.github/workflows/reusable_verify_dockerfiles.yml
    with:
      component-root: Components/player
