name: UnitTestFederates

on:
  push:
    branches: [ main, al/restructed ]
  pull_request:
    branches: [ main ]

jobs:
  test-all-components:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}

    - name: Install components with dev dependencies
      shell: bash -l {0}
      run: |
        pip install -e "Components/broker[dev]" \
                    -e "Components/lindistflow_federate[dev]" \
                    -e "Components/LocalFeeder[dev]" \
                    -e "Components/measuring_federate[dev]" \
                    -e "Components/omoo_federate[dev]" \
                    -e "Components/recorder[dev]" \
                    -e "Components/wls_federate[dev]"

    - name: Run all component tests
      shell: bash -l {0}
      run: |
        pytest Components/ -v --color=yes
      env:
        PYTEST_ADDOPTS: "--color=yes"
        PYTHONIOENCODING: UTF-8
