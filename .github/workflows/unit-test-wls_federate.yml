name: Unit Test - wls_federate

on:
  workflow_dispatch:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/wls_federate/**'
      - '.github/workflows/unit-test-wls_federate.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/wls_federate/**'
      - '.github/workflows/unit-test-wls_federate.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']


    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/wls_federate[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/wls_federate/tests/ -v --cov=wls_federate --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/wls_federate
        mypy src/wls_federate --ignore-missing-imports
      continue-on-error: true
