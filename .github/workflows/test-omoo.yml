name: Test - OMOO Federate

on:
  push:
    branches: [ main, al/restructed, al/add-omoo-component ]
    paths:
      - 'Components/omoo_federate/**'
      - '.github/workflows/test-omoo.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/omoo_federate/**'
      - '.github/workflows/test-omoo.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/omoo_federate[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/omoo_federate/tests/ -v --cov=omoo_federate --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/omoo_federate
        mypy src/omoo_federate --ignore-missing-imports
      continue-on-error: true
