name: Unit Test - nlpdopf

on:
  workflow_dispatch:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/nlpdopf/**'
      - '.github/workflows/unit-test-nlpdopf.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/nlpdopf/**'
      - '.github/workflows/unit-test-nlpdopf.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']
        exclude:
          - python-version: '3.11'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/nlpdopf[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/nlpdopf/tests/ -v --cov=nlpdopf --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/nlpdopf
        mypy src/nlpdopf --ignore-missing-imports
      continue-on-error: true
