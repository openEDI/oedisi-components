name: Publish Docker Images on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use (e.g., v1.2.3). If empty, uses release tag from the release event.'
        required: false
        default: 'v0.0.1'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_KEY }}

      - name: Find Docker contexts and build+push
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -eu
          echo "Finding Dockerfiles..."
          # find directories containing a Dockerfile (limit depth to avoid scanning big folders)
          mapfile -t dirs < <(find . -maxdepth 4 -type f -name Dockerfile -exec dirname {} \; | sort -u)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No Dockerfiles found. Exiting."
            exit 0
          fi

          echo "Found contexts:"
          for d in "${dirs[@]}"; do
            echo " - $d"
          done

          # Normalize a tag without a leading 'v' (so both 'v1.2.3' and '1.2.3' are available)
          NORMALIZED_TAG=$(echo "${RELEASE_TAG}" | sed 's/^v//')

          for d in "${dirs[@]}"; do
            # create an image name from path: replace leading ./ and slashes with _
            name=$(echo "$d" | sed 's|^\./||; s|/|_|g')
            image_with_v="${DOCKERHUB_USERNAME}/${name}:${RELEASE_TAG}"
            image_no_v="${DOCKERHUB_USERNAME}/${name}:${NORMALIZED_TAG}"
            echo "Building and pushing ${image_with_v} and ${image_no_v} from context ${d}"
            docker buildx build --platform linux/amd64,linux/arm64 -t "${image_with_v}" -t "${image_no_v}" "${d}" --push
          done
