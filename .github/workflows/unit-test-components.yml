name: Unit Test - Components

on:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/**'
      - '.github/workflows/unit-test-components.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/**'
      - '.github/workflows/unit-test-components.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']
        component: [
          'broker',
          'lindistflow_federate',
          'LocalFeeder',
          'measuring_federate',
          'omoo_federate',
          'recorder',
          'wls_federate'
        ]
        include:
          - component: broker
            package: broker
          - component: lindistflow_federate
            package: lindistflow_federate
          - component: LocalFeeder
            package: localfeeder
          - component: measuring_federate
            package: measuring_federate
          - component: omoo_federate
            package: omoo_federate
          - component: recorder
            package: recorder
          - component: wls_federate
            package: wls_federate

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/${{ matrix.component }}[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/${{ matrix.component }}/tests/ -v --cov=${{ matrix.package }} --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/${{ matrix.component }}
        mypy src/${{ matrix.package }} --ignore-missing-imports
      continue-on-error: true
