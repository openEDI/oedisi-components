name: Unit Test - pnnl-dsse-ekf

on:
  workflow_dispatch:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/pnnl-dsse-ekf/**'
      - '.github/workflows/unit-test-pnnl-dsse-ekf.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/pnnl-dsse-ekf/**'
      - '.github/workflows/unit-test-pnnl-dsse-ekf.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/pnnl-dsse-ekf[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/pnnl-dsse-ekf/tests/ -v
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/pnnl-dsse-ekf
        mypy src/ekf_federate --ignore-missing-imports
      continue-on-error: true
