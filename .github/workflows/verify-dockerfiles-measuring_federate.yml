name: Verify Dockerfiles - measuring_federate

on:
  workflow_dispatch:
  push:
    paths:
      - 'Components/measuring_federate/**'
      - '.github/workflows/verify-dockerfiles-measuring_federate.yml'
      - '.github/workflows/reusable_verify_dockerfiles.yml'

jobs:
  verify:
    uses: ./.github/workflows/reusable_verify_dockerfiles.yml
    with:
      component-root: Components/measuring_federate
