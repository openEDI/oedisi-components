name: Verify Components - player

on:
  push:
    paths:
      - 'Components/player/**'
      - '.github/workflows/verify-components-player.yml'
      - '.github/workflows/reusable_verify_components.yml'

jobs:
  verify:
    uses: ./.github/workflows/reusable_verify_components.yml
    with:
      component-root: Components/player
