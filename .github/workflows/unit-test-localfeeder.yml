name: Unit Test - LocalFeeder

on:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/LocalFeeder/**'
      - '.github/workflows/unit-test-localfeeder.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/LocalFeeder/**'
      - '.github/workflows/unit-test-localfeeder.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']


    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/LocalFeeder[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/LocalFeeder/tests/ -v --cov=localfeeder --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/LocalFeeder
        mypy src/localfeeder --ignore-missing-imports
      continue-on-error: true
