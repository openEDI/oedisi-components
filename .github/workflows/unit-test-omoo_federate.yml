name: Unit Test - omoo_federate

on:
  workflow_dispatch:
  push:
    branches: [ main, al/restructed ]
    paths:
      - 'Components/omoo_federate/**'
      - '.github/workflows/unit-test-omoo_federate.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Components/omoo_federate/**'
      - '.github/workflows/unit-test-omoo_federate.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']


    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e Components/omoo_federate[dev]

    - name: Run tests with pytest
      run: |
        pytest Components/omoo_federate/tests/ -v --cov=omoo_federate --cov-report=term
      env:
        PYTEST_ADDOPTS: "--color=yes"

    - name: Run type checking with mypy
      run: |
        cd Components/omoo_federate
        mypy src/omoo_federate --ignore-missing-imports
      continue-on-error: true
